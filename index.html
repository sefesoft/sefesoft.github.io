<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Provino App</title>
    <style>
        /* Estilos básicos para que funcione el prototipo */
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        nav { display: flex; justify-content: space-around; background: white; padding: 10px; border-bottom: 1px solid #ddd; }
        nav button { border: none; background: none; font-weight: bold; color: #333; padding: 10px; cursor: pointer; }
        .page { padding: 20px; display: none; } /* Ocultar todas las páginas por defecto */
        #home { display: block; } /* Mostrar la página de inicio por defecto */
        .card { background: white; padding: 15px; border-radius: 8px; margin-top: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header>
        <h1>Provino</h1>
    </header>

    <nav>
        <button onclick="showPage('home')">Inicio</button>
        <button onclick="showPage('directory')">Directorio</button>
        <button onclick="showPage('events')">Eventos</button>
        <button onclick="showPage('promos')">Promos</button>
    </nav>

    <main>
        <section id="home" class="page">
            <h2>Bienvenido</h2>
            <p>Tu guía oficial del Valle.</p>
        </section>

        <section id="directory" class="page">
            <h2>Vinícolas</h2>
            <div class="card"><h3>Monte Xanic</h3></div>
            <div class="card"><h3>L.A. Cetto</h3></div>
        </section>

        <section id="events" class="page">
            <h2>Eventos</h2>
            <p>Próximos conciertos y catas.</p>
        </section>

        <section id="promos" class="page">
            <h2>Promociones</h2>
            <p>Descubre ofertas exclusivas.</p>
        </section>
    </main>

    <div id="install-banner" style="display: none; position: fixed; bottom: 0; width: 100%; background: #2c3e50; color: white; padding: 15px; text-align: center; z-index: 1000;">
        <p>¿Quieres acceso rápido?</p>
        <button id="btn-install" style="background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px;">Instalar App</button>
    </div>

    <script>
        // --- 1. LÓGICA DE NAVEGACIÓN ---
        function showPage(pageId) {
            // Ocultar todas las secciones
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            // Mostrar solo la seleccionada
            document.getElementById(pageId).style.display = 'block';
        }

        // --- 2. LÓGICA PWA ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Error:', err));
        }

        // --- 3. LÓGICA DE INSTALACIÓN ---
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const installBtn = document.getElementById('btn-install');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'block'; // Mostrar el banner solo si es instalable
        });

        installBtn.addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        installBanner.style.display = 'none';
                    }
                });
            }
        });
    </script>
</body>
</html>
