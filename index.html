<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Provino App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Provino</div>
    </header>

    <nav>
        <button onclick="showPage('home')">Inicio</button>
        <button onclick="showPage('directory')">Directorio</button>
        <button onclick="showPage('events')">Eventos</button>
        <button onclick="showPage('promos')">Promos</button>
    </nav>

    <main id="content">
        <section id="home" class="page">
            <h2>Bienvenido</h2>
            <p>Tu guía oficial del Valle de Guadalupe.</p>
        </section>
        
        </main>

    <div id="install-banner" style="display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #2c3e50; color: white; padding: 20px; text-align: center; border-radius: 20px 20px 0 0; z-index: 1000;">
        <h3 id="install-title">¡Instala la App!</h3>
        <button id="btn-install" style="background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px;">Instalar</button>
    </div>

    <script>
    let deferredPrompt;
    const installBanner = document.getElementById('install-banner');
    const installBtn = document.getElementById('btn-install');

    // Escuchar el evento de instalación
    window.addEventListener('beforeinstallprompt', (e) => {
        console.log("¡Evento beforeinstallprompt detectado!");
        alert("¡El navegador permitió la instalación!"); // Alerta de prueba
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'block';
    });

    // Escuchar el click
    installBtn.addEventListener('click', () => {
        if (deferredPrompt) {
            console.log("Iniciando prompt...");
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('Usuario aceptó la instalación');
                }
                deferredPrompt = null;
            });
        } else {
            // Si llega aquí, es que el navegador no considera la web instalable aún
            alert("El navegador no permite instalar. Asegúrate de estar en HTTPS o localhost y haber navegado un poco.");
        }
    });
	</script>
</body>
</html>
