<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Provino - Valle de Guadalupe</title>
    <meta
      name="description"
      content="Directorio PWA de bodegas, eventos y promociones en el Valle de Guadalupe."
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#7b1f3a" />
    <link rel="icon" href="assets/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <span class="brand-title">Provino</span>
          <span class="brand-subtitle" data-i18n="brand.subtitle">Valle de Guadalupe</span>
        </div>
        <div class="header-actions">
          <div class="lang-toggle" role="group" aria-label="Idioma">
            <button class="lang-option is-active" type="button" data-lang="es" aria-pressed="true">ES</button>
            <button class="lang-option" type="button" data-lang="en" aria-pressed="false">EN</button>
          </div>
          <button class="install-btn" id="installBtn" hidden type="button" data-i18n="install.btn">Instalar App</button>
        </div>
      </header>

      <nav class="app-nav" aria-label="Navegación principal">
        <button class="nav-link is-active" data-route="home" data-i18n="nav.home">Inicio</button>
        <button class="nav-link" data-route="wineries" data-i18n="nav.wineries">Bodegas</button>
        <button class="nav-link" data-route="events" data-i18n="nav.events">Eventos</button>
        <button class="nav-link" data-route="promos" data-i18n="nav.promos">Promociones</button>
        <button class="nav-link" data-route="map" data-i18n="nav.map">Mapa</button>
      </nav>

      <main id="app" class="app-main" role="main" aria-live="polite"></main>

      <div class="install-sheet" id="installSheet" hidden aria-live="polite">
        <div class="install-sheet-inner">
          <h2 class="install-sheet-title" id="installSheetTitle" data-i18n="installSheet.title">Instala Provino</h2>
          <p class="install-sheet-text" id="installSheetText" data-i18n="installSheet.text">
            Instala la app para acceder más rápido a bodegas, mapa y promociones del Valle de Guadalupe.
          </p>
          <div class="install-sheet-actions">
            <button class="install-sheet-primary" id="installSheetPrimary" type="button" data-i18n="installSheet.primary">
              Instalar ahora
            </button>
            <button class="install-sheet-secondary" id="installSheetClose" type="button" data-i18n="installSheet.close">
              No mostrar de nuevo
            </button>
          </div>
        </div>
      </div>

      <template id="view-home">
        <section class="view">
          <h1 class="view-title" data-i18n="view.home.title">Bienvenido a Provino</h1>
          <p class="view-text" data-i18n="view.home.text">
            Explora bodegas, eventos y promociones del Valle de Guadalupe desde una
            experiencia rápida y lista para instalar en tu teléfono.
          </p>
        </section>
      </template>

      <template id="view-wineries">
        <section class="view">
          <h1 class="view-title" data-i18n="view.wineries.title">Bodegas</h1>
          <p class="view-text" data-i18n="view.wineries.text">
            Explora algunas de las bodegas más representativas del Valle de Guadalupe.
          </p>
          <div id="wineriesList" class="wineries-list"></div>
        </section>
      </template>

      <template id="view-winery-detail">
        <section class="view">
          <button class="back-btn" id="wineryBackBtn" type="button" data-i18n="back.wineries">Volver a Bodegas</button>
          <div id="wineryDetail" class="winery-detail"></div>
        </section>
      </template>

      <template id="view-events">
        <section class="view">
          <h1 class="view-title" data-i18n="view.events.title">Eventos</h1>
          <p class="view-text" data-i18n="view.events.text">
            Eventos y experiencias en el Valle de Guadalupe. Toca uno para ver detalles.
          </p>
          <div id="eventsList" class="events-list"></div>
        </section>
      </template>

      <template id="view-event-detail">
        <section class="view">
          <button class="back-btn" id="eventBackBtn" type="button" data-i18n="back.events">Volver a Eventos</button>
          <div id="eventDetail" class="event-detail"></div>
        </section>
      </template>

      <template id="view-promos">
        <section class="view">
          <h1 class="view-title" data-i18n="view.promos.title">Promociones</h1>
          <p class="view-text" data-i18n="view.promos.text">
            Ofertas y promociones vigentes en el Valle de Guadalupe. Toca una para ver detalles.
          </p>
          <div id="promosList" class="promos-list"></div>
        </section>
      </template>

      <template id="view-promo-detail">
        <section class="view">
          <button class="back-btn" id="promoBackBtn" type="button" data-i18n="back.promos">Volver a Promociones</button>
          <div id="promoDetail" class="promo-detail"></div>
        </section>
      </template>

      <template id="view-map">
        <section class="view">
          <h1 class="view-title" data-i18n="view.map.title">Mapa interactivo</h1>
          <p class="view-text" data-i18n="view.map.text">
            Descubre de un vistazo dónde se encuentran las bodegas del Valle de Guadalupe.
          </p>
          <div
            id="mapView"
            class="map-view"
            role="region"
            aria-label="Mapa con la ubicación de las bodegas"
            data-i18n-aria-label="view.map.ariaLabel"
          ></div>
        </section>
      </template>

      <footer class="app-footer">
        <small data-i18n="footer.copyright"></small>
      </footer>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      crossorigin=""
    ></script>
    <script src="js/app.js" type="module"></script>
  </body>
</html>
