<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Provino App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Provino</div>
    </header>

    <nav>
        <button onclick="showPage('home')">Inicio</button>
        <button onclick="showPage('directory')">Directorio</button>
        <button onclick="showPage('events')">Eventos</button>
        <button onclick="showPage('promos')">Promos</button>
    </nav>

    <main id="content">
        <section id="home" class="page">
            <h2>Bienvenido</h2>
            <p>Tu guía oficial del Valle de Guadalupe.</p>
        </section>
        
        </main>

    <div id="install-banner" style="display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #2c3e50; color: white; padding: 20px; text-align: center; border-radius: 20px 20px 0 0; z-index: 1000;">
        <h3 id="install-title">¡Instala la App!</h3>
        <button id="btn-install" style="background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px;">Instalar</button>
    </div>

    <script>
        // 1. LÓGICA DE NAVEGACIÓN (SPA)
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
        }

        // 2. LÓGICA PWA (Service Worker)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker registrado'))
            .catch((err) => console.log('Error:', err));
        }

        // 3. LÓGICA DE INSTALACIÓN
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'block';
        });

        document.getElementById('btn-install').addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
            }
        });
    </script>
</body>
</html>
